<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Barsound</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#111111">
        <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-180.png">
        <style>
            .image-upload-item,
            .frame,
            .sound-btn {
                -webkit-user-select: none;
                user-select: none;
                -webkit-touch-callout: none;
                touch-action: manipulation;
            }
            .label {
                -webkit-user-select: text;
                user-select: text;
            }
        </style>
    </head>
    <body>
        <input type="file" id="globalImageInput" accept="image/*" style="display:none" />
        <input type="file" id="globalAudioInput" accept="audio/*" style="display:none" />

        <!-- Custom RGB Color Picker Modal -->
        <div id="colorPickerOverlay" class="color-overlay hidden">
            <div class="color-modal">
                <div class="color-preview" id="colorPreview"></div>
                <div class="color-sliders">
                    <label>R <span id="rVal">128</span>
                        <input type="range" id="rSlider" min="0" max="255" value="128" class="slider slider-r">
                    </label>
                    <label>G <span id="gVal">128</span>
                        <input type="range" id="gSlider" min="0" max="255" value="128" class="slider slider-g">
                    </label>
                    <label>B <span id="bVal">128</span>
                        <input type="range" id="bSlider" min="0" max="255" value="128" class="slider slider-b">
                    </label>
                </div>
                <div class="color-hex-row">
                    <span>#</span>
                    <input type="text" id="hexInput" maxlength="6" value="808080" spellcheck="false">
                </div>
                <div class="color-swatches" id="colorSwatches"></div>
                <div class="color-actions">
                    <button id="colorCancel">Cancel</button>
                    <button id="colorApply">Apply</button>
                </div>
            </div>
        </div>

        <div class="soundboard-grid" id="soundboardGrid"></div>

        <script>
            /* ---------------------------
               IndexedDB wrapper
            --------------------------- */
            const DB_NAME = 'barsound_db';
            const DB_VERSION = 1;
            const STORE = 'items'; // keyPath = id (0..5)

            function openDB() {
                return new Promise((res, rej) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE)) {
                            db.createObjectStore(STORE, { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = () => res(req.result);
                    req.onerror  = () => rej(req.error);
                });
            }

            async function getItem(id) {
                const db = await openDB();
                return new Promise((res, rej) => {
                    const tx    = db.transaction(STORE, 'readonly');
                    const store = tx.objectStore(STORE);
                    const r     = store.get(Number(id));
                    r.onsuccess = () => res(r.result || null);
                    r.onerror   = () => rej(r.error);
                });
            }

            async function putItem(item) {
                const db = await openDB();
                return new Promise((res, rej) => {
                    const tx    = db.transaction(STORE, 'readwrite');
                    const store = tx.objectStore(STORE);
                    const r     = store.put(item);
                    r.onsuccess = () => res(r.result);
                    r.onerror   = () => rej(r.error);
                });
            }

            async function deleteItem(id) {
                const db = await openDB();
                return new Promise((res, rej) => {
                    const tx    = db.transaction(STORE, 'readwrite');
                    const store = tx.objectStore(STORE);
                    const r     = store.delete(Number(id));
                    r.onsuccess = () => res();
                    r.onerror   = () => rej(r.error);
                });
            }

            /* ---------------------------
               App state + helpers
            --------------------------- */
            const audioPlayers  = {};
            let currentAudioTarget = null;
            let currentColorTarget = null;
            const objectUrlMap = { images: {}, audio: {} };

            function saveField(id, field, value) {
                return (async () => {
                    const existing = (await getItem(id)) || { id: Number(id) };
                    existing[field] = value;
                    await putItem(existing);
                })();
            }

            function saveBlobAndField(id, field, blob) {
                return (async () => {
                    const existing = (await getItem(id)) || { id: Number(id) };
                    existing[field] = blob;
                    await putItem(existing);
                })();
            }

            function setPreviewImageFromBlob(itemElem, blob) {
                const img = itemElem.querySelector('.preview');
                if (!blob) {
                    img.src = '';
                    img.style.display = 'none';
                    return;
                }
                const id = itemElem.dataset.id;
                if (objectUrlMap.images[id]) URL.revokeObjectURL(objectUrlMap.images[id]);
                const url = URL.createObjectURL(blob);
                objectUrlMap.images[id] = url;
                img.src = url;
                img.style.display = 'block';
                itemElem.querySelector('.placeholder').style.display = 'none';
            }

            function setAudioFromBlob(itemElem, blob) {
                const id  = itemElem.dataset.id;
                const btn = itemElem.querySelector('.sound-btn');
                if (!blob) {
                    if (audioPlayers[id]) {
                        try { audioPlayers[id].pause(); } catch {}
                        audioPlayers[id] = undefined;
                    }
                    btn.classList.remove('has-audio');
                    return;
                }
                if (objectUrlMap.audio[id]) URL.revokeObjectURL(objectUrlMap.audio[id]);
                const url   = URL.createObjectURL(blob);
                objectUrlMap.audio[id] = url;
                const audio = new Audio(url);
                audio.onended = () => { btn.textContent = 'Play'; };
                audioPlayers[id] = audio;
                btn.classList.add('has-audio');
            }

            /* ---------------------------
               Play / Stop handler
            --------------------------- */
            function handleSoundBtn(btn, item) {
                const id     = item.dataset.id;
                const player = audioPlayers[id];
                if (!player) { triggerAudioInput(item); return; }
                if (player.paused) {
                    player.currentTime = 0;
                    player.play();
                    btn.textContent = 'Stop';
                } else {
                    player.pause();
                    player.currentTime = 0;
                    btn.textContent = 'Play';
                }
            }

            /* ---------------------------
               File inputs
            --------------------------- */
            function triggerImageInput(item) {
                const input = document.getElementById('globalImageInput');
                input.dataset.targetId = item.dataset.id;
                input.value = '';
                input.click();
            }

            document.getElementById('globalImageInput').addEventListener('change', async function (e) {
                const file     = e.target.files[0];
                const targetId = e.target.dataset.targetId;
                if (!file || targetId === undefined) return;
                const targetItem = document.querySelector(`.image-upload-item[data-id="${targetId}"]`);
                if (!targetItem) return;

                // immediate local preview
                const img         = targetItem.querySelector('.preview');
                const placeholder = targetItem.querySelector('.placeholder');
                const reader      = new FileReader();
                reader.onload = (evt) => {
                    img.src                  = evt.target.result;
                    img.style.display        = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(file);

                // persist to IndexedDB
                try {
                    await saveBlobAndField(targetId, 'image', file);
                    const rec = await getItem(targetId);
                    if (rec && rec.image) setPreviewImageFromBlob(targetItem, rec.image);
                } catch (err) {
                    console.error('Failed to save image to IndexedDB', err);
                }
            });

            function triggerAudioInput(item) {
                currentAudioTarget = item;
                const input = document.getElementById('globalAudioInput');
                input.value = '';
                input.click();
            }

            document.getElementById('globalAudioInput').addEventListener('change', async function (e) {
                const file = e.target.files[0];
                if (!file || !currentAudioTarget) return;
                const id  = currentAudioTarget.dataset.id;
                const btn = currentAudioTarget.querySelector('.sound-btn');

                // immediate playback
                if (objectUrlMap.audio[id]) {
                    try { URL.revokeObjectURL(objectUrlMap.audio[id]); } catch {}
                }
                const objectUrl = URL.createObjectURL(file);
                objectUrlMap.audio[id] = objectUrl;
                const audio = new Audio(objectUrl);
                audio.onended = () => { btn.textContent = 'Play'; };
                audioPlayers[id] = audio;
                btn.classList.add('has-audio');

                // persist to IndexedDB, then refresh player from stored blob
                try {
                    await saveBlobAndField(id, 'audio', file);
                    const rec = await getItem(id);
                    if (rec && rec.audio) setAudioFromBlob(currentAudioTarget, rec.audio);
                } catch (err) {
                    console.error('Failed to save audio to IndexedDB', err);
                } finally {
                    currentAudioTarget = null;
                }
            });

            /* ---------------------------
               Build grid
            --------------------------- */
            const grid = document.getElementById('soundboardGrid');

            for (let i = 0; i < 6; i++) {
                const item = document.createElement('div');
                item.className  = 'image-upload-item';
                item.dataset.id = i;
                item.innerHTML  = `
                    <p class="label" contenteditable="true" spellcheck="false">Sound ${i + 1}</p>
                    <div class="frame">
                        <div class="placeholder">Upload image</div>
                        <img class="preview" alt="Preview" style="display:none"/>
                    </div>
                    <button class="sound-btn">Play</button>
                `;

                const frame = item.querySelector('.frame');
                const btn   = item.querySelector('.sound-btn');
                const label = item.querySelector('.label');

                /*
                 * Per-item press state.
                 * Each cell gets its own variables — no shared globals that
                 * can be stomped when the user taps two cells in quick succession.
                 */
                let bgPressTimer  = null;  // setTimeout handle for color-picker long-press
                let frameDownTime = 0;     // timestamp of pointerdown on frame
                let btnDownTime   = 0;     // timestamp of pointerdown on sound-btn

                /* ---- Item background: long-press (≥600 ms) → color picker ----
                 *
                 * We keep the setTimeout approach here because opening a modal
                 * doesn't require a direct user-gesture token (unlike file input).
                 * pointercancel is now handled so the timer is always cleared.
                 */
                item.addEventListener('pointerdown', () => {
                    bgPressTimer = setTimeout(() => {
                        bgPressTimer = null;
                        openColorPicker(item);
                    }, 600);
                });
                const clearBgTimer = () => {
                    if (bgPressTimer) { clearTimeout(bgPressTimer); bgPressTimer = null; }
                };
                item.addEventListener('pointerup',     clearBgTimer);
                item.addEventListener('pointerleave',  clearBgTimer);
                item.addEventListener('pointercancel', clearBgTimer);  // ← was missing
                item.addEventListener('contextmenu', e => e.preventDefault());

                /* ---- Label: stop propagation so holding to position cursor
                 *      on iOS doesn't accidentally fire the color-picker timer ----
                 */
                label.addEventListener('pointerdown', e => e.stopPropagation());

                /* ---- Frame: tap (< 600 ms) → image upload ----
                 *
                 * KEY FIX: triggerImageInput calls input.click() directly from
                 * pointerup — a genuine user-gesture handler — so iOS Safari
                 * will honour the file-picker open request.
                 *
                 * setPointerCapture means pointerup still fires on `frame` even
                 * if the user's finger drifts slightly off the element before
                 * lifting, making short taps reliable.
                 */
                frame.addEventListener('pointerdown', e => {
                    e.stopPropagation();
                    frame.setPointerCapture(e.pointerId);
                    frameDownTime = Date.now();
                });
                frame.addEventListener('pointerup', e => {
                    e.stopPropagation();
                    if (frameDownTime && (Date.now() - frameDownTime) < 600) {
                        triggerImageInput(item);  // ← called from user-gesture handler ✓
                    }
                    frameDownTime = 0;
                });
                frame.addEventListener('pointercancel', e => {  // ← was missing
                    e.stopPropagation();
                    frameDownTime = 0;
                });
                frame.addEventListener('contextmenu', e => e.preventDefault());

                /* ---- Sound button: tap (< 600 ms) → play/stop
                 *                    hold (≥ 600 ms) → change audio ----
                 *
                 * KEY FIX: both branches call their action synchronously inside
                 * pointerup, which is a direct user-gesture handler. Previously
                 * triggerAudioInput was called from a setTimeout callback, which
                 * iOS Safari treats as non-gesture and silently blocks the file
                 * picker. Now the elapsed time is measured at pointerup instead.
                 *
                 * setPointerCapture keeps events on `btn` even if the finger
                 * drifts off during the hold, so the hold is reliably detected.
                 */
                btn.addEventListener('pointerdown', e => {
                    e.stopPropagation();
                    btn.setPointerCapture(e.pointerId);
                    btnDownTime = Date.now();
                });
                btn.addEventListener('pointerup', e => {
                    e.stopPropagation();
                    if (!btnDownTime) return;
                    const elapsed = Date.now() - btnDownTime;
                    btnDownTime = 0;
                    if (elapsed >= 600) {
                        triggerAudioInput(item);   // ← called from user-gesture handler ✓
                    } else {
                        handleSoundBtn(btn, item);
                    }
                });
                btn.addEventListener('pointercancel', e => {  // ← was missing
                    e.stopPropagation();
                    btnDownTime = 0;
                });
                btn.addEventListener('contextmenu', e => e.preventDefault());

                /* ---- Label: persist title (debounced) ---- */
                let titleDebounce = null;
                label.addEventListener('input', () => {
                    if (titleDebounce) clearTimeout(titleDebounce);
                    titleDebounce = setTimeout(() => {
                        saveField(item.dataset.id, 'title', label.textContent.trim());
                        titleDebounce = null;
                    }, 350);
                });

                grid.appendChild(item);
            }

            /* ---------------------------
               RGB Color Picker
            --------------------------- */
            const swatchColors = [
                '#000000','#aaaaaa','#aaa000','#3a1a1a',
                '#2d1b4e','#4a3000','#e74c3c','#e67e22',
                '#2ecc71','#1abc9c','#3498db','#ffffff'
            ];

            const overlay  = document.getElementById('colorPickerOverlay');
            const preview  = document.getElementById('colorPreview');
            const rSlider  = document.getElementById('rSlider');
            const gSlider  = document.getElementById('gSlider');
            const bSlider  = document.getElementById('bSlider');
            const rVal     = document.getElementById('rVal');
            const gVal     = document.getElementById('gVal');
            const bVal     = document.getElementById('bVal');
            const hexInput = document.getElementById('hexInput');

            const swatchContainer = document.getElementById('colorSwatches');
            swatchColors.forEach(hex => {
                const s = document.createElement('button');
                s.className        = 'swatch';
                s.style.background = hex;
                s.addEventListener('click', () => {
                    setRGB(
                        parseInt(hex.slice(1, 3), 16),
                        parseInt(hex.slice(3, 5), 16),
                        parseInt(hex.slice(5, 7), 16)
                    );
                });
                swatchContainer.appendChild(s);
            });

            function setRGB(r, g, b) {
                rSlider.value = r; gSlider.value = g; bSlider.value = b;
                rVal.textContent = r; gVal.textContent = g; bVal.textContent = b;
                const hex = [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                hexInput.value         = hex;
                preview.style.background = `rgb(${r},${g},${b})`;
            }

            function syncFromSliders() {
                setRGB(+rSlider.value, +gSlider.value, +bSlider.value);
            }
            rSlider.addEventListener('input', syncFromSliders);
            gSlider.addEventListener('input', syncFromSliders);
            bSlider.addEventListener('input', syncFromSliders);

            hexInput.addEventListener('input', function () {
                const hex = this.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 6);
                this.value = hex;
                if (hex.length === 6) {
                    setRGB(
                        parseInt(hex.slice(0, 2), 16),
                        parseInt(hex.slice(2, 4), 16),
                        parseInt(hex.slice(4, 6), 16)
                    );
                }
            });

            function openColorPicker(item) {
                currentColorTarget = item;
                const current = item.style.backgroundColor || 'rgb(26,26,26)';
                const match   = current.match(/\d+/g);
                if (match) setRGB(+match[0], +match[1], +match[2]);
                overlay.classList.remove('hidden');
            }

            document.getElementById('colorApply').addEventListener('click', async () => {
                if (currentColorTarget) {
                    const r     = +rSlider.value, g = +gSlider.value, b = +bSlider.value;
                    const color = `rgb(${r},${g},${b})`;
                    currentColorTarget.style.backgroundColor = color;
                    await saveField(currentColorTarget.dataset.id, 'bgColor', color);
                }
                currentColorTarget = null;
                overlay.classList.add('hidden');
            });

            document.getElementById('colorCancel').addEventListener('click', () => {
                currentColorTarget = null;
                overlay.classList.add('hidden');
            });

            overlay.addEventListener('pointerdown', e => {
                if (e.target === overlay) {
                    currentColorTarget = null;
                    overlay.classList.add('hidden');
                }
            });

            /* ---------------------------
               Load saved data on startup
            --------------------------- */
            async function loadExistingFiles() {
                for (let i = 0; i < 6; i++) {
                    const itemElem = document.querySelector(`.image-upload-item[data-id="${i}"]`);
                    if (!itemElem) continue;
                    const rec = await getItem(i);
                    if (!rec) continue;
                    if (rec.title)   itemElem.querySelector('.label').textContent = rec.title;
                    if (rec.bgColor) itemElem.style.backgroundColor = rec.bgColor;
                    if (rec.image)   setPreviewImageFromBlob(itemElem, rec.image);
                    if (rec.audio)   setAudioFromBlob(itemElem, rec.audio);
                }
            }

            loadExistingFiles();

            /* ---------------------------
               Service worker
            --------------------------- */
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.warn('SW registration failed:', err);
                });
            }
        </script>
    </body>
</html>
